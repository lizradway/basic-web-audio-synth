<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Browser Keyboard Synth</title>

<style>

body {
    font-family: Arial, Helvetica, sans-serif;
    background: #121212;
    color: white;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    height: 100vh;
    margin: 0;
}

.container {
    text-align: center;
    background: #1e1e1e;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
}

h1 {
    margin-top: 0;
}

.description {
    color: #ccc;
    margin-bottom: 20px;
}

.controls {
    margin-top: 15px;
}

select {
    padding: 6px 10px;
    font-size: 14px;
    border-radius: 5px;
    border: none;
}

.key-guide {
    margin-top: 25px;
    font-size: 14px;
    color: #aaa;
}

.footer {
    position: absolute;
    bottom: 15px;
    font-size: 12px;
    color: #777;
}

</style>
</head>

<body>

<div class="container">

<h1>🎹 Browser Synth</h1>

<p id="description" class="description">
Press keys on your keyboard to play notes.
</p>

<div class="controls">
<span id="waveformText">Waveform:</span>

<select id="waveform">
  <option value="sine">Sine</option>
  <option value="square">Square</option>
  <option value="sawtooth" selected="selected">Sawtooth</option>
  <option value="triangle">Triangle</option>
</select>
</div>

<div id="buttonContainer"></div>

<div class="key-guide">
Lower row: Z X C V B N M<br>
Upper row: Q W E R T Y U
</div>

</div>

<div class="footer">
Built with the Web Audio API
</div>

<script src="main.js"></script>

</body>
</html>
